name: Deploy Auto Quran

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_DIR: ~/auto-quran-app

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies locally
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare SSH access
        run: |
          set -euo pipefail

          # Validate required secrets to avoid writing empty keys
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: Missing one or more required secrets: SSH_PRIVATE_KEY, SSH_HOST, SSH_USER"
            echo "Please add them in repository Settings → Secrets and Variables → Actions."
            exit 1
          fi

          mkdir -p ~/.ssh

          # Write private key safely; fail if empty
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add host fingerprint (best-effort) but ignore failures from ssh-keyscan
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Copy the project to the server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p ${APP_DIR}"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/"

      - name: Install dependencies and restart the app
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<EOF
          set -e
          cd ${APP_DIR}

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          pkill -f "python app.py" || true
          nohup .venv/bin/python app.py > app.log 2>&1 &
          EOF
