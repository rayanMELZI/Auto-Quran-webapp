name: Deploy Auto Quran

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_DIR: ~/auto-quran-app

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install cloudflared for tunnel access
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Prepare SSH access with Cloudflare Tunnel
        run: |
          set -euo pipefail

          # Validate required secrets
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: Missing one or more required secrets: SSH_PRIVATE_KEY, SSH_HOST, SSH_USER"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          tee ~/.ssh/config > /dev/null <<'SSHEOF'
          Host *
            StrictHostKeyChecking accept-new
            ProxyCommand cloudflared access ssh --hostname %h
          SSHEOF
          chmod 644 ~/.ssh/config

      - name: Copy the project to the server
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p ${APP_DIR}"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude 'assets/*' \
            --exclude 'output/*' \
            --exclude 'data/*' \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<EOF
          set -e
          cd ${APP_DIR}

          # Stop and disable old systemctl service if it exists
          if systemctl is-active --quiet quran-app; then
            sudo systemctl stop quran-app
            sudo systemctl disable quran-app
          fi

          # Create .env file from secrets
          cat > .env <<ENVEOF
          UNSPLASH_API_KEY=${{ secrets.UNSPLASH_API_KEY }}
          INSTA_USERNAME=${{ secrets.INSTA_USERNAME }}
          INSTA_PASSWORD=${{ secrets.INSTA_PASSWORD }}
          PORT=5000
          ENVEOF

          # Ensure directories exist for volumes
          mkdir -p assets output data

          # Deploy using Docker Compose
          sudo docker compose up --build -d
          EOF
