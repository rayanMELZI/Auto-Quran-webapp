<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="landing-page">
        <!-- Background -->
        <div class="bg-container">
            <div class="bg-image">
                <img src="https://images.unsplash.com/photo-1519791883288-dc8bd696e667?w=1920&h=1440&fit=crop" alt="Background">
            </div>
            <div class="bg-overlay"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Navigation Bar -->
            <nav class="navbar">
                <div class="nav-links">
                    <a href="#home" class="nav-link">Home</a>
                    <a href="#services" class="nav-link">Services</a>
                    <a href="#instagram" class="nav-link">Instagram</a>
                    <a href="#contact" class="nav-link">Contact</a>
                </div>
                <div class="lang-btn">
                    <button class="lang-button">العربية</button>
                </div>
            </nav>

            <!-- Home Section -->
            <section class="home-section" id="home">
                <!-- Channels -->
                <div class="channels">
                    <!-- Channel 1 (Left) -->
                    <div class="channel channel-left">
                        <div class="photo-container">
                            <div class="story-ring">
                                <svg viewBox="0 0 226.925 226.925" fill="none">
                                    <circle cx="113.463" cy="113.463" r="110.311" stroke="url(#gradient1)" stroke-width="6.30348" />
                                    <defs>
                                        <linearGradient id="gradient1" x1="250.812" y1="23.8869" x2="6.40696e-06" y2="176.166" gradientUnits="userSpaceOnUse">
                                            <stop stop-color="#C913B9" />
                                            <stop offset="0.500947" stop-color="#F9373F" />
                                            <stop offset="1" stop-color="#FECD00" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </div>
                            <div class="photo">
                                <img src="https://images.unsplash.com/photo-1609599006353-e629aaabfeae?w=400&h=400&fit=crop" alt="Quran">
                            </div>
                        </div>
                        <h2 class="channel-name">wisdomfrom.quran</h2>
                        <p class="channel-description">Quran instagram chanel</p>
                        <div class="channel-buttons">
                            <button class="follow-btn follow-btn-blue">Follow</button>
                            <button class="visit-btn visit-btn-blue">Visit</button>
                        </div>
                    </div>

                    <!-- Channel 2 (Right) -->
                    <div class="channel channel-right">
                        <div class="photo-container">
                            <div class="story-ring">
                                <svg viewBox="0 0 226.925 226.925" fill="none">
                                    <circle cx="113.463" cy="113.463" r="110.311" stroke="url(#gradient2)" stroke-width="6.30348" />
                                    <defs>
                                        <linearGradient id="gradient2" x1="250.812" y1="23.8869" x2="6.40696e-06" y2="176.166" gradientUnits="userSpaceOnUse">
                                            <stop stop-color="#C913B9" />
                                            <stop offset="0.500947" stop-color="#F9373F" />
                                            <stop offset="1" stop-color="#FECD00" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </div>
                            <div class="photo">
                                <img src="https://images.unsplash.com/photo-1609599006353-e629aaabfeae?w=400&h=400&fit=crop" alt="Quran">
                            </div>
                        </div>
                        <h2 class="channel-name">wisdomfrom.quran</h2>
                        <p class="channel-description">Quran instagram chanel</p>
                        <div class="channel-buttons">
                            <button class="follow-btn follow-btn-red">Follow</button>
                            <button class="visit-btn visit-btn-red">Visit</button>
                        </div>
                    </div>
                </div>

                <!-- Post Cards -->
                <div class="post-cards">
                    <div class="card">
                        <div class="card-more">
                            <svg viewBox="0 0 14 3" fill="none">
                                <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
                                <circle cx="7" cy="1.5" r="1.5" fill="white" />
                                <circle cx="12.5" cy="1.5" r="1.5" fill="white" />
                            </svg>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-more">
                            <svg viewBox="0 0 14 3" fill="none">
                                <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
                                <circle cx="7" cy="1.5" r="1.5" fill="white" />
                                <circle cx="12.5" cy="1.5" r="1.5" fill="white" />
                            </svg>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-more">
                            <svg viewBox="0 0 14 3" fill="none">
                                <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
                                <circle cx="7" cy="1.5" r="1.5" fill="white" />
                                <circle cx="12.5" cy="1.5" r="1.5" fill="white" />
                            </svg>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-more">
                            <svg viewBox="0 0 14 3" fill="none">
                                <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
                                <circle cx="7" cy="1.5" r="1.5" fill="white" />
                                <circle cx="12.5" cy="1.5" r="1.5" fill="white" />
                            </svg>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-more">
                            <svg viewBox="0 0 14 3" fill="none">
                                <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
                                <circle cx="7" cy="1.5" r="1.5" fill="white" />
                                <circle cx="12.5" cy="1.5" r="1.5" fill="white" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Show All Button -->
                <div class="show-all-container">
                    <button class="show-all-btn">Show All</button>
                </div>
            </section>

            <!-- Services Section -->
            <section class="services-section" id="services">
                <h2 class="services-title">Services</h2>
                <div class="services-cards">
                    <div class="service-card">
                        <h3 class="service-title">Quran auto poster</h3>
                    </div>
                    <div class="service-card">
                        <h3 class="service-title">Chroma quran API</h3>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
